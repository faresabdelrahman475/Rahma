<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hob</title>
    <style>
        /* التصميم العام والخلفية الرومانسية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffe4e1 0%, #ffb6c1 50%, #ff69b4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* شاشة القفل الرومانسية */
        .lock-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffe4e1 0%, #ffb6c1 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .lock-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.15);
            text-align: center;
            max-width: 350px;
            width: 85%;
            border: 2px solid #fff;
        }

        .lock-card h3 {
            color: #d11a5b;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .password-input {
            width: 80%;
            padding: 12px;
            border: 2px solid #ffb6c1;
            border-radius: 12px;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
            background: rgba(255, 255, 255, 0.7);
        }

        .password-input:focus {
            border-color: #d11a5b;
        }

        .unlock-btn {
            background: #d11a5b;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(209, 26, 91, 0.3);
            transition: background 0.3s, transform 0.2s;
        }

        .unlock-btn:hover {
            background: #b0124a;
            transform: scale(1.05);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* كارت العداد الرئيسي (مخفي جزئياً في البداية) */
        .container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #fff;
            z-index: 10;
            display: none; /* يظهر بعد فتح القفل */
        }

        /* عنوان الصفحة */
        h2 { 
            color: #d11a5b; 
            font-size: 24px;
            margin-bottom: 20px;
            margin-top: 0;
        }

        .heart-icon {
            font-size: 40px;
            color: #e74c3c;
            animation: heartbeat 1.2s infinite;
            margin-bottom: 10px;
        }

        /* أنيميشن نبض القلب */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.1); }
            40% { transform: scale(1.15); }
            60% { transform: scale(1); }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* تصميم المربعات الرأسية */
        .time-blocks {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
        }

        .time-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 14px;
            border: 1px solid rgba(209, 26, 91, 0.15);
            box-shadow: 0 3px 10px rgba(0,0,0,0.03);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: scale(1.02);
        }

        .time-label {
            font-size: 16px;
            color: #555;
            font-weight: 600;
        }

        .highlight {
            font-weight: bold;
            color: #d11a5b;
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
        }

        /* قلوب الخلفية المتحركة */
        .bg-heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.4);
            font-size: 20px;
            animation: floatUp 6s linear infinite;
            bottom: -50px;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<!-- قلوب متحركة في الخلفية تعمل في الشاشتين -->
<div class="bg-heart" style="left: 10%; animation-delay: 0s;">❤️</div>
<div class="bg-heart" style="left: 25%; animation-delay: 2s; font-size: 30px;">💖</div>
<div class="bg-heart" style="left: 55%; animation-delay: 1s;">💕</div>
<div class="bg-heart" style="left: 70%; animation-delay: 4s; font-size: 25px;">❤️</div>
<div class="bg-heart" style="left: 85%; animation-delay: 3s;">💗</div>

<!-- شاشة القفل الرومانسية المضافة -->
<div class="lock-screen" id="lockScreen">
    <div class="lock-card">
        <div class="heart-icon">🔒❤️</div>
        <h3>Enter Password Rahma</h3>
        <input type="password" id="passwordInput" class="password-input" placeholder="Password...">
        <br>
        <button class="unlock-btn" onclick="checkPassword()">Unlock ❤</button>
        <div class="error-msg" id="errorMsg"> Fuck </div>
    </div>
</div>

<!-- كارت العداد الرئيسي بالإنجليزية -->
<div class="container" id="mainContainer">
    <div class="heart-icon">❤️</div>
    <h2>I Love You Rahma Forever</h2>
    
    <div class="time-blocks" id="output">
        <div class="time-box"><span class="time-label">Months</span><span class="highlight" id="months">-</span></div>
        <div class="time-box"><span class="time-label">Days</span><span class="highlight" id="days">-</span></div>
        <div class="time-box"><span class="time-label">Hours</span><span class="highlight" id="hours">-</span></div>
        <div class="time-box"><span class="time-label">Minutes</span><span class="highlight" id="minutes">-</span></div>
        <div class="time-box"><span class="time-label">Seconds</span><span class="highlight" id="seconds">-</span></div>
    </div>
</div>

<script>
// -------------------------------------------------------------
// الباسورد الإفتراضي وتاريخ العداد
// -------------------------------------------------------------
const SECRET_PASSWORD = "17/2/2026"; // يمكنك تغيير الباسورد من هنا لأي كلمة تريدها
const TARGET_DATE = new Date(2026, 1, 17, 8, 00); 

// دالة التحقق من كلمة المرور
function checkPassword() {
    const userInput = document.getElementById('passwordInput').value;
    const lockScreen = document.getElementById('lockScreen');
    const mainContainer = document.getElementById('mainContainer');
    const errorMsg = document.getElementById('errorMsg');

    if (userInput.toLowerCase() === SECRET_PASSWORD.toLowerCase()) {
        // إخفاء شاشة القفل بتأثير ناعم وعرض العداد
        lockScreen.style.opacity = '0';
        setTimeout(() => {
            lockScreen.style.visibility = 'hidden';
            mainContainer.style.display = 'block';
            updateCounter();
            setInterval(updateCounter, 1000); // بدء العد التلقائي
        }, 600);
    } else {
        errorMsg.style.display = 'block';
        document.getElementById('passwordInput').value = '';
    }
}

// دالة حساب الوقت المنقضي
function updateCounter() {
    const now = new Date(); 
    let diffMs = now - TARGET_DATE;

    if (diffMs < 0) {
        document.getElementById('output').innerHTML = "<div style='color: #e74c3c; font-weight: bold; padding: 20px;'>The selected date is in the future! Please select a past date in the code.</div>";
        return;
    }

    const msInSecond = 1000;
    const msInMinute = msInSecond * 60;
    const msInHour = msInMinute * 60;
    const msInDay = msInHour * 24;
    const msInMonth = msInDay * 30.436875; 

    let months = Math.floor(diffMs / msInMonth);
    diffMs -= months * msInMonth;

    let days = Math.floor(diffMs / msInDay);
    diffMs -= days * msInDay;

    let hours = Math.floor(diffMs / msInHour);
    diffMs -= hours * msInHour;

    let minutes = Math.floor(diffMs / msInMinute);
    diffMs -= minutes * msInMinute;

    let seconds = Math.floor(diffMs / msInSecond);

    document.getElementById('months').innerText = months + " Months";
    document.getElementById('days').innerText = days + " Days";
    document.getElementById('hours').innerText = hours + " Hours";
    document.getElementById('minutes').innerText = minutes + " Mins";
    document.getElementById('seconds').innerText = seconds + " Secs";
}

// السماح بالدخول عبر الضغط على زر Enter في الكيبورد
document.getElementById('passwordInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        checkPassword();
    }
});
</script>

</body>
</html>
